<html lang="en">
<head>
<meta charset="UTF-8">
<title>NextGen HMS - Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-card">

<h2>🏥 NextGen Hospital</h2>
<p>Hospital Management Application</p>

<select id="role">
<option value="admin">Admin</option>
<option value="doctor">Doctor</option>
<option value="patient">Patient</option>
<option value="receptionist">Receptionist</option>
</select>

<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>

<button id="loginBtn">Login</button>

<small>
Admin: admin / admin123 <br>
Doctor: doctor1 / doctor123 <br>
Patient: patient1 / patient123 <br>
Receptionist: reception1 / recep123
</small>

<p style="font-size:12px;color:gray;margin-top:10px;">
This is a student demo project. No real data is collected.
</p>

</div>


<script>

document.getElementById("loginBtn").addEventListener("click", async function () {

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

try {

const response = await fetch("http://127.0.0.1:5000/login", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
username: username,
password: password
})

});

const data = await response.json();

if (response.ok) {

localStorage.setItem("token", data.token);
localStorage.setItem("role", data.role);

alert("Login successful!");

if(data.role === "admin"){
window.location.href = "admin_dashboard.html";
}

else if(data.role === "doctor"){
window.location.href = "doctor_dashboard.html";
}

else if(data.role === "patient"){
window.location.href = "patient_dashboard.html";
}

else if(data.role === "receptionist"){
window.location.href = "reception_dashboard.html";
}

} else {

alert(data.message);

}

} catch(error){

alert("Backend server not running");

}

});

</script>

</body>
</html>
